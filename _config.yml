# --- Academic Pages minimal config ---

# IMPORTANT: use remote_theme, not theme
remote_theme: academicpages/academicpages.github.io

title: Chenhao Chiu

# Site settings
locale: en-US
markdown: kramdown
permalink: /:categories/:title/

# Plugins supported by GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache

author:
  name: 邱振豪
  bio: "Speech Behavior and Science Lab (NTU)"
  email: "chenhaochiu@ntu.edu.tw"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/chenhaochiu"
    - label: "CV"
      icon: "far fa-fw fa-file-pdf"
      url: "https://www.dropbox.com/scl/fi/yrvwcsg4kbdkz7u/CV_CHIU.pdf?rlkey=07mmin3mvhve9s5bx2jyzq15v&dl=1"

minimal_mistakes_skin: default
include:
  - _pages
  - assets

