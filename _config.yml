# --- Academic Pages minimal config ---

# IMPORTANT: use remote_theme, not theme
remote_theme: academicpages/academicpages.github.io

title: Chenhao Chiu

# Site settings
locale: en-US
markdown: kramdown
permalink: /:categories/:title/

# Plugins supported by GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache



minimal_mistakes_skin: default
include:
  - _pages
  - assets

